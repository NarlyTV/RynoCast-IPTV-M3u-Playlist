name: Delete old m3u files

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Delete .m3u files older than 7 days
        run: |
          find . -type f -name "*.m3u" -mtime +7 -exec rm -f {} \;

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Auto delete old m3u files" || echo "No changes"
          git push
