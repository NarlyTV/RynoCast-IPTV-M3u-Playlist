name: Delete old m3u files

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete .m3u files older than 7 days
        run: |
          echo "Scanning .m3u files..."
          find . -type f -name "*.m3u" | while read file; do
            if [ $(date -r "$file" +%s) -lt $(date -d "7 days ago" +%s) ]; then
              echo "Deleting $file"
              rm -f "$file"
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Auto delete old .m3u files" || echo "No changes to commit"
          git push
